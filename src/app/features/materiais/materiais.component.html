<div class="container">
    <header>
        <h2>Catálogo de Materiais</h2>
        <p>Cadastre os insumos e seus respectivos rendimentos para os cálculos de área.</p>
    </header>

    <section class="form-section">
        <form [formGroup]="materialForm" (ngSubmit)="onSubmit()" class="grid-form">

            <div class="form-group">
                <label>Nome do Material</label>
                <input type="text" formControlName="nome" placeholder="Ex: Cola PU 40, Deck de Ipê...">
            </div>

            <div class="form-group">
                <label>Categoria</label>
                <select formControlName="categoria">
                    <option value="madeira">Madeira (Pisos/Decks)</option>
                    <option value="ferragem">Ferragens (Pregos/Presilhas)</option>
                    <option value="quimico">Químicos (Cola/Verniz)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Unidade de Medida</label>
                <select formControlName="unidade">
                    <option value="m2">Metro Quadrado (m²)</option>
                    <option value="kg">Quilograma (kg)</option>
                    <option value="litro">Litro (L)</option>
                    <option value="un">Unidade (Un)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Rendimento por m²</label>
                <input type="number" formControlName="rendimentoPorM2" step="0.01"
                    title="Quantidade gasta para fazer 1m²">
            </div>

            <div class="form-group">
                <label>Margem de Perda (%)</label>
                <input type="number" formControlName="perdaPadrao" step="1">
            </div>

            <button type="submit" class="btn-submit" [disabled]="materialForm.invalid">
                Salvar Material
            </button>
        </form>
    </section>

    <section class="list-section">
        <h3>Materiais Cadastrados</h3>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Rendimento/m²</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let mat of materiais$ | async">
                        <td>{{ mat.nome }}</td>
                        <td class="capitalize">{{ mat.categoria }}</td>
                        <td>{{ mat.rendimentoPorM2 }} {{ mat.unidade }}</td>
                        <td>
                            <button class="btn-delete" (click)="excluirMaterial(mat.id)">Excluir</button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div *ngIf="(materiais$ | async)?.length === 0" class="empty-state">
                Nenhum material cadastrado ainda.
            </div>
        </div>
    </section>
</div>
