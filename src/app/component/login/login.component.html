<div class="login-wrapper">
    <div class="login-card">
        <div class="brand-area">
            <div class="logo-icon">🪵</div>
            <h2>Arruda Pisos de Madeira</h2>
            <p>Acesso ao Sistema</p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" formControlName="email" placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" formControlName="password" placeholder="••••••••">
            </div>

            <div class="error-msg" *ngIf="erro">
                ⚠️ {{ erro }}
            </div>

            <button type="submit" class="btn-submit" [disabled]="loginForm.invalid || isCarregando">
                {{ isCarregando ? 'Entrando...' : 'Entrar' }}
            </button>
        </form>
    </div>
</div>
